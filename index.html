function buildMonths() {
  const out = [];
  // Jun 2026 → Jun 2027 = 13 Monate
  const start = new Date(2026, 5, 1);
  for (let i = 0; i <= 12; i++) {
    const d = new Date(start.getFullYear(), start.getMonth() + i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    out.push({ key, label: MONTH_LABELS[d.getMonth()], full: `${MONTH_LABELS[d.getMonth()]} ${d.getFullYear()}` });
  }
  return out;
}

/* ---------- Supabase Helpers ---------- */
async function loadPlayers() {
  const { data: players, error: e1 } = await sb.from('players').select('*').order('name');
  if (e1) throw e1;
  const { data: measurements, error: e2 } = await sb.from('measurements').select('*').limit(10000);
  if (e2) throw e2;
  const { data: motivation, error: e3 } = await sb.from('motivation').select('*').limit(10000);
  if (e3) throw e3;
  const { data: notesData, error: e4 } = await sb.from('notes').select('*').limit(10000);
  if (e4) throw e4;
  return players.map(p => {
    const data = {};
    METRICS.forEach(m => {
      data[m.id] = measurements
        .filter(r => r.player_id === p.id && r.metric_id === m.id)
        .map(r => ({ month: r.month, value: Number(r.value) }))
        .sort((a, b) => a.month.localeCompare(b.month));
    });
    const motMap = {};
    motivation.filter(r => r.player_id === p.id).forEach(r => { motMap[r.month] = r.value; });
    const notesMap = {};
    (notesData || []).filter(r => r.player_id === p.id).forEach(r => { notesMap[r.month] = r.text; });
    return { ...p, data, motivation: motMap, notes: notesMap };
  });
}

async function savePlayer(player) {
  const { error } = await sb.from('players').upsert({
    id: player.id, name: player.name, position: player.position,
    email: player.email, age: Number(player.age), plan: player.plan,
    weight: player.weight ? Number(player.weight) : null,
    height: player.height ? Number(player.height) : null,
    plan_start_date: player.plan_start_date || null,
  });
  if (error) throw error;
}

async function deletePlayerFromDB(playerId) {
  await sb.from('measurements').delete().eq('player_id', playerId);
  await sb.from('motivation').delete().eq('player_id', playerId);
  await sb.from('notes').delete().eq('player_id', playerId);
  const { error } = await sb.from('players').delete().eq('id', playerId);
  if (error) throw error;
}

function calcTrainingWeek(startDate) {
  if (!startDate) return null;
  const start = new Date(startDate);
  const now = new Date();
  start.setHours(0,0,0,0);
  now.setHours(0,0,0,0);
  const diffMs = now - start;
  if (diffMs < 0) return null;
  return Math.floor(diffMs / (7 * 24 * 60 * 60 * 1000)) + 1;
}

async function saveMeasurement(playerId, metricId, month, value) {
  const { error } = await sb.from('measurements').upsert(
    { player_id: playerId, metric_id: metricId, month, value },
    { onConflict: 'player_id,metric_id,month' }
  );
  if (error) throw error;
}

async function saveMotivation(playerId, month, value) {
  const { error } = await sb.from('motivation').upsert(

    { onConflict: 'player_id,month' }

  if (error) throw error;
}

async function saveNote(playerId, month, text) {
  const { error } = await sb.from('notes').upsert(

}

async function addPlayerToDB(player) {
  const { data, error } = await sb.from('players').insert({
    name: player.name, position: player.position, email: player.email,
    age: Number(player.age) || null, plan: player.plan,
    weight: Number(player.weight) || null, height: Number(player.height) || null,
    plan_start_date: player.plan_start_date || null,
  }).select().single();
  if (error) throw error;
  const emptyData = {};
  METRICS.forEach(m => { emptyData[m.id] = []; });
  return { ...data, data: emptyData, motivation: {} };
}

/* ---------- Entwicklungs-Zusammenfassung ---------- */
function DevSummary({ player }) {
  const summary = useMemo(() => {
    return METRICS.map(m => {
      const series = (player.data[m.id] || []).filter(s => s.value != null);
      if (series.length < 2) return { ...m, first: null, last: null, diff: null, pct: null };
      const first = series[0].value;
      const last = series[series.length - 1].value;
      const diff = last - first;
      const pct = first !== 0 ? (diff / Math.abs(first)) * 100 : 0;
      const positive = m.higherBetter === null ? null : (m.higherBetter ? diff > 0 : diff < 0);
      return { ...m, first, last, diff, pct, positive };
    }).filter(m => m.first !== null);
  }, [player]);

  if (summary.length === 0) return React.createElement("p", { style: { opacity: 0.5, fontSize: 13, textAlign: "center", margin: "8px 0" } }, "Noch keine Messdaten vorhanden.");

  return React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
    summary.map(m => {
      const isWeight = m.id === "weight";
      const arrow = m.diff > 0 ? "↑" : m.diff < 0 ? "↓" : "→";
      // Gewicht: immer neutral (kein grün/rot)
      const color = isWeight ? C.accent : (m.positive === true ? "#22c55e" : m.positive === false ? "#ef4444" : C.accent);
      const barW = Math.min(Math.abs(m.pct), 100);
      const displayPct = m.higherBetter === false ? -m.pct : m.pct;
      return React.createElement("div", { key: m.id, style: { background: "rgba(255,255,255,0.04)", borderRadius: 10, padding: "10px 12px" } },
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: isWeight ? 0 : 6 } },
          React.createElement("span", { style: { fontSize: 13, fontWeight: 600 } }, m.name),
          React.createElement("span", { style: { fontSize: 13, color, fontWeight: 700 } },
            isWeight
              ? `${arrow} ${m.diff > 0 ? "+" : ""}${Math.round(m.diff * 10) / 10} ${m.unit}  ·  ${m.first} → ${m.last} ${m.unit}`
              : `${arrow} ${m.diff > 0 ? "+" : ""}${m.id === "sprint" ? m.diff.toFixed(2) : Math.round(m.diff)} ${m.unit} (${displayPct > 0 ? "+" : ""}${displayPct.toFixed(1)}%)`
          )
        ),
        !isWeight && React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 8, fontSize: 11, opacity: 0.6 } },
          React.createElement("span", null, `Start: ${m.first} ${m.unit}`),
          React.createElement("div", { style: { flex: 1, height: 4, background: "rgba(255,255,255,0.1)", borderRadius: 2 } },
            React.createElement("div", { style: { width: `${barW}%`, height: "100%", background: color, borderRadius: 2, transition: "width 0.4s" } })
          ),
          React.createElement("span", null, `Aktuell: ${m.last} ${m.unit}`)
        )
      );
    })
  );
}

/* ---------- App ---------- */
function App() {
  const [players, setPlayers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedId, setSelectedId] = useState(null);
  const selected = players.find(p => p.id === selectedId);

  useEffect(() => {
    loadPlayers()
      .then(data => { setPlayers(data); setLoading(false); })
      .catch(err => {
        var b = document.getElementById('error-box');
        b.style.display = 'block';
        b.textContent = 'Supabase Fehler: ' + err.message;
        setLoading(false);
      });
  }, []);

  function updatePlayer(updated) { setPlayers(prev => prev.map(p => p.id === updated.id ? updated : p)); }
  function addPlayer(p) { setPlayers(prev => [...prev, p].sort((a, b) => a.name.localeCompare(b.name))); }
  function removePlayer(id) { setPlayers(prev => prev.filter(p => p.id !== id)); setSelectedId(null); }

  if (loading) return React.createElement("div", { style: { padding: 40, textAlign: "center", opacity: 0.6, fontFamily: "'Saira', sans-serif" } }, "Daten werden geladen…");

  return React.createElement("div", { style: { background: C.bg, minHeight: "100vh", color: C.text, fontFamily: "'Saira', sans-serif", padding: "20px 16px 60px" } },
    React.createElement("div", { style: { maxWidth: 480, margin: "0 auto" } },
      selected
        ? React.createElement(PlayerDetail, { player: selected, onBack: () => setSelectedId(null), onUpdate: updatePlayer, onDelete: removePlayer })
        : React.createElement(PlayerList, { players, onSelect: setSelectedId, onAdd: addPlayer })
    )
  );
}

/* ---------- Preview-Modus ---------- */
const IS_PREVIEW = typeof window !== 'undefined' && new URLSearchParams(window.location.search).has('preview');

/* ---------- Login ---------- */
function Login() {
  const [email, setEmail] = React.useState("");
  const [pw, setPw] = React.useState("");
  const [err, setErr] = React.useState("");
  const [busy, setBusy] = React.useState(false);
  const inp = { width:"100%", boxSizing:"border-box", marginBottom:"12px", padding:"12px 14px",
    background:C.inputBg, color:C.text, border:"1px solid "+C.cardBorder,
    borderRadius:"8px", fontSize:"15px", outline:"none" };
  const btn = { width:"100%", padding:"13px", background:C.accent, color:"#060c27",
    fontWeight:800, fontSize:"15px", border:"none", borderRadius:"8px", cursor:"pointer" };
  async function submit() {
    setErr(""); setBusy(true);
    const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password: pw });
    setBusy(false);
    if (error) setErr(error.message || "Login fehlgeschlagen");
  }
  return React.createElement("div", { style:{ minHeight:"100vh", display:"flex", alignItems:"center",
      justifyContent:"center", background:C.bg, padding:"20px" } },
    React.createElement("div", { style:{ width:"100%", maxWidth:"380px", background:C.cardBg,
        border:"1px solid "+C.cardBorder, borderRadius:"16px", padding:"30px" } },
      React.createElement("h1", { style:{ color:C.text, fontSize:"22px", margin:"0 0 6px", fontWeight:800 } },
        "EHM Athletik-Tracker"),
      React.createElement("p", { style:{ color:"rgba(255,255,255,0.7)", fontSize:"14px", margin:"0 0 20px" } },
        "Bitte mit deinem Vereins-Zugang einloggen."),
      React.createElement("input", { type:"email", placeholder:"E-Mail", value:email,
        autoComplete:"username", onChange:e=>setEmail(e.target.value), style:inp }),
      React.createElement("input", { type:"password", placeholder:"Passwort", value:pw,
        autoComplete:"current-password", onChange:e=>setPw(e.target.value),
        onKeyDown:e=>{ if(e.key==="Enter") submit(); }, style:inp }),
      err ? React.createElement("div", { style:{ color:"#ff9c9c", fontSize:"13px", margin:"2px 0 10px" } }, err) : null,
      React.createElement("button", { onClick:submit, disabled:busy, style:btn },
        busy ? "\u2026" : "Einloggen")
    )
  );
}

/* ---------- Root (Auth-Gate + Preview) ---------- */
function Root() {
  const [session, setSession] = React.useState(IS_PREVIEW ? "preview" : undefined);
  React.useEffect(() => {
    if (IS_PREVIEW) return;
    sb.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => { sub.subscription.unsubscribe(); };
  }, []);
  if (IS_PREVIEW) return React.createElement(React.Fragment, null,
    React.createElement("div", { style:{ background:"rgba(72,207,253,0.13)",
        borderBottom:"1px solid rgba(72,207,253,0.35)", padding:"9px 18px",
        textAlign:"center", fontSize:"13px", color:"rgba(255,255,255,0.88)",
        fontFamily:"system-ui,sans-serif", letterSpacing:".2px" } },
      "Demo-Vorschau \u00b7 Beispieldaten des Mustervereins \u00b7 Kein Login erforderlich"),
    React.createElement(App, null)
  );
  if (session === undefined)
    return React.createElement("div", { style:{ minHeight:"100vh", display:"flex",
        alignItems:"center", justifyContent:"center", background:C.bg, color:C.text } },
      "L\u00e4dt\u2026");
  if (!session) return React.createElement(Login, null);
  return React.createElement(React.Fragment, null,
    React.createElement("button", { onClick:()=>sb.auth.signOut(),
      style:{ position:"fixed", top:"10px", right:"10px", zIndex:9999,
        background:"rgba(255,255,255,0.12)", color:C.text,
        border:"1px solid "+C.cardBorder, borderRadius:"8px",
        padding:"6px 12px", fontSize:"12px", cursor:"pointer" } }, "Abmelden"),
    React.createElement(App, null)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Root, null));
</script>
